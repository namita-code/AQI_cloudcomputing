version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: aqi-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - aqi-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aqi-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/aqidb
      - PORT=5000
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - aqi-network
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  aqi-network:
    driver: bridge
